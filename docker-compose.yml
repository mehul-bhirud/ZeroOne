services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: assetflow
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow -d assetflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - assetflow-postgres:/var/lib/postgresql/data

volumes:
  assetflow-postgres:

